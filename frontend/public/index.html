<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ebe4ff" />
    <meta name="description" content="CipherCampus - Secure Academic Collaboration & Anonymous Reporting Platform" />
    <title>CipherCampus | Secure Academic Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.ico" />
    <style>
        /* Additional global styles */
        .success {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .security-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 12px;
        }
        
        .security-info ul {
            margin-left: 20px;
        }
        
        .post-badge, .message-badge, .security-badge {
            font-size: 10px;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 5px;
        }
        
        .encryption-badge {
            background: #e3f2fd;
            color: #1565c0;
            padding: 4px 8px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .checkbox-label input {
            width: auto;
            margin: 0;
        }
        
        .info-box {
            background: #fff3cd;
            border: 1px solid #ffecb5;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .admin-panel .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .users-table th, .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .users-table th {
            background: #1a1a2e;
            color: white;
        }
        
        .rotate-btn, .delete-btn, .decrypt-btn {
            padding: 5px 10px;
            margin: 0 5px;
            font-size: 12px;
            width: auto;
        }
        
        .rotate-btn {
            background: #ffc107;
            color: #333;
        }
        
        .delete-btn {
            background: #dc3545;
        }
        
        .decrypt-btn {
            background: #17a2b8;
        }
        
        .status {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status.pending {
            background: #ffc107;
            color: #333;
        }
        
        .status.reviewed {
            background: #17a2b8;
            color: white;
        }
        
        .status.resolved {
            background: #28a745;
            color: white;
        }
        
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .admin-tabs button {
            width: auto;
            padding: 10px 20px;
            background: #e9ecef;
            color: #333;
        }
        
        .admin-tabs button.active {
            background: #1a1a2e;
            color: white;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .post-card, .document-card, .message {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
