# CipherCampus full stack (development-style). Run from repo root:
#   docker compose up --build
#
# MySQL is seeded with database/schema.sql on first volume init.
# Frontend is built with REACT_APP_API_URL pointing at the host-mapped backend (localhost:5000).

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cipher_root}
      MYSQL_DATABASE: ciphercampus
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cipher_root}
      DB_NAME: ciphercampus
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-docker_dev_change_me_use_long_random}
      REDIS_URL: redis://redis:6379
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${PUBLIC_API_URL:-http://localhost:5000/api}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  # Optional: `docker compose --profile queue up -d` — set USE_MAIL_QUEUE=true on backend too.
  mail-worker:
    profiles: [queue]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "worker.js"]
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mysql_data:
