name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pci_root"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client
      - name: Wait for MySQL
        run: |
          for i in $(seq 1 60); do
            mysqladmin ping -h 127.0.0.1 -uroot -pci_root --silent && exit 0
            sleep 2
          done
          exit 1
      - name: Import schema
        run: mysql -h 127.0.0.1 -uroot -pci_root < database/schema.sql
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Run database migrations
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: ci_root
          DB_NAME: ciphercampus
          NODE_ENV: test
        run: npx knex migrate:latest
      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: ci_root
          DB_NAME: ciphercampus
          JWT_SECRET: ci_jwt_secret_at_least_32_chars_long
          NODE_ENV: test
        run: npm test -- --runInBand

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        env:
          CI: 'true'
        run: npm test -- --watchAll=false
      - name: Build
        working-directory: frontend
        env:
          CI: 'true'
          REACT_APP_API_URL: http://localhost:5000/api
        run: npm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        working-directory: frontend
        env:
          CI: 'true'
        run: npm run test:e2e
